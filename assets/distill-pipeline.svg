<svg viewBox="0 0 940 430" xmlns="http://www.w3.org/2000/svg" font-family="Songti SC, Noto Serif CJK SC, STSong, serif">
  <rect width="940" height="430" fill="#faf7f0"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6b7a"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#b03a2e"/>
    </marker>
  </defs>
  <text x="470" y="40" text-anchor="middle" font-size="22" fill="#1f1f1f" font-weight="bold">蒸馏流水线：四步分析 + 三步闭环</text>

  <!-- top row: analysis -->
  <g font-size="15">
    <rect x="40" y="80" width="150" height="64" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="115" y="106" text-anchor="middle" fill="#1f1f1f" font-weight="bold">① 语料分层</text>
    <text x="115" y="128" text-anchor="middle" font-size="12" fill="#5b6b7a">核心 / 辅助 / 外部评论</text>

    <rect x="225" y="80" width="150" height="64" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="300" y="106" text-anchor="middle" fill="#1f1f1f" font-weight="bold">② 计量指纹</text>
    <text x="300" y="128" text-anchor="middle" font-size="12" fill="#5b6b7a">句长 / 词频 / 功能词 / 标点</text>

    <rect x="410" y="80" width="150" height="64" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="485" y="106" text-anchor="middle" fill="#1f1f1f" font-weight="bold">③ 多维深读</text>
    <text x="485" y="128" text-anchor="middle" font-size="12" fill="#5b6b7a">七层各一 agent，引文为证</text>

    <rect x="595" y="80" width="150" height="64" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="670" y="106" text-anchor="middle" fill="#1f1f1f" font-weight="bold">④ 评论吸收</text>
    <text x="670" y="128" text-anchor="middle" font-size="12" fill="#5b6b7a">权威研究只给线索</text>

    <rect x="780" y="80" width="130" height="64" rx="8" fill="#f3ede0" stroke="#b03a2e" stroke-width="1.6"/>
    <text x="845" y="106" text-anchor="middle" fill="#1f1f1f" font-weight="bold">⑤ 编纂封装</text>
    <text x="845" y="128" text-anchor="middle" font-size="12" fill="#5b6b7a">spec + 范例 + 露馅清单</text>
  </g>
  <line x1="190" y1="112" x2="218" y2="112" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="375" y1="112" x2="403" y2="112" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="112" x2="588" y2="112" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="745" y1="112" x2="773" y2="112" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- down from 5 to 6 -->
  <line x1="845" y1="144" x2="845" y2="216" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- bottom row: loop -->
  <g font-size="15">
    <rect x="770" y="222" width="150" height="70" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="845" y="248" text-anchor="middle" fill="#1f1f1f" font-weight="bold">⑥ 试写生成</text>
    <text x="845" y="270" text-anchor="middle" font-size="12" fill="#5b6b7a">六种场景 · 混入真迹</text>

    <rect x="520" y="222" width="190" height="70" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="615" y="248" text-anchor="middle" fill="#1f1f1f" font-weight="bold">⑦ 三层判别</text>
    <text x="615" y="270" text-anchor="middle" font-size="12" fill="#5b6b7a">计量 → LLM rubric → 人盲测</text>

    <rect x="280" y="222" width="160" height="70" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1.6"/>
    <text x="360" y="248" text-anchor="middle" fill="#2e7d32" font-weight="bold">通过 → 发布 v1</text>
    <text x="360" y="270" text-anchor="middle" font-size="12" fill="#5b6b7a">使用中露馅点持续回流</text>
  </g>
  <line x1="770" y1="257" x2="718" y2="257" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="257" x2="448" y2="257" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- fail loop back to 5 -->
  <path d="M 615 292 C 615 360, 360 380, 120 370 C 60 366, 60 300, 60 200 C 60 150, 90 130, 120 118" fill="none" stroke="#b03a2e" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrRed)"/>
  <text x="330" y="345" font-size="13" fill="#b03a2e">不通过：差距归因到具体层的具体条目（语言层节奏？负空间漏禁忌？）→ 修订 spec → 重新编纂</text>

  <!-- annotation -->
  <text x="40" y="410" font-size="13" fill="#7a7264">⑥⑦ 与评测方法论同构：生成 → 判别 → 归因 → 迭代的自举循环。判别器同时用于拒绝采样（N 选一），把输出推向分布尾部。</text>
</svg>
