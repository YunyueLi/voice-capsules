<svg viewBox="0 0 940 660" xmlns="http://www.w3.org/2000/svg" font-family="Songti SC, Noto Serif CJK SC, STSong, serif">
  <rect width="940" height="660" fill="#faf7f0"/>
  <text x="470" y="42" text-anchor="middle" font-size="24" fill="#1f1f1f" font-weight="bold">作家封装（Voice Capsule）：七层模型与两条贯穿轴</text>

  <!-- 负空间 dashed frame -->
  <rect x="120" y="70" width="480" height="512" rx="14" fill="none" stroke="#b03a2e" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="136" y="600" font-size="14" fill="#b03a2e">负空间（贯穿约束）：这位作家绝不做什么 —— 露馅清单，判别时一票否决</text>

  <!-- layers -->
  <g font-size="17">
    <!-- 1 -->
    <rect x="150" y="88" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="113" fill="#b03a2e" font-weight="bold">一</text><text x="198" y="113" fill="#1f1f1f" font-weight="bold">语言层</text>
    <text x="198" y="135" font-size="13" fill="#5b6b7a">词汇 · 句法 · 节奏 · 修辞 · 标点</text>
    <line x1="570" y1="117" x2="628" y2="117" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="121" font-size="13" fill="#7a7264">钱钟书的博喻机器；汪曾祺的短句</text>
    <!-- 2 -->
    <rect x="150" y="156" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="181" fill="#b03a2e" font-weight="bold">二</text><text x="198" y="181" fill="#1f1f1f" font-weight="bold">叙事层</text>
    <text x="198" y="203" font-size="13" fill="#5b6b7a">视角 · 时间 · 场景调度 · 对话功能</text>
    <line x1="570" y1="185" x2="628" y2="185" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="189" font-size="13" fill="#7a7264">马丁的 POV 轮转制度</text>
    <!-- 3 -->
    <rect x="150" y="224" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="249" fill="#b03a2e" font-weight="bold">三</text><text x="198" y="249" fill="#1f1f1f" font-weight="bold">结构层</text>
    <text x="198" y="271" font-size="13" fill="#5b6b7a">篇章架构 · 情节编排 · 伏笔系统 · 节奏管理</text>
    <line x1="570" y1="253" x2="628" y2="253" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="257" font-size="13" fill="#7a7264">乌贼的百万字伏笔回收</text>
    <!-- 4 -->
    <rect x="150" y="292" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="317" fill="#b03a2e" font-weight="bold">四</text><text x="198" y="317" fill="#1f1f1f" font-weight="bold">人物层</text>
    <text x="198" y="339" font-size="13" fill="#5b6b7a">塑造方法 · 人物语言分化 · 人物弧</text>
    <line x1="570" y1="321" x2="628" y2="321" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="325" font-size="13" fill="#7a7264">《红楼梦》一人一口吻</text>
    <!-- 5 -->
    <rect x="150" y="360" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="385" fill="#b03a2e" font-weight="bold">五</text><text x="198" y="385" fill="#1f1f1f" font-weight="bold">世界观层</text>
    <text x="198" y="407" font-size="13" fill="#5b6b7a">母题与执念 · 价值观 · 人性假设</text>
    <line x1="570" y1="389" x2="628" y2="389" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="393" font-size="13" fill="#7a7264">刘慈欣的宇宙尺度道德实验</text>
    <!-- 6 -->
    <rect x="150" y="428" width="420" height="58" rx="8" fill="#ffffff" stroke="#c9c0ae"/>
    <text x="172" y="453" fill="#b03a2e" font-weight="bold">六</text><text x="198" y="453" fill="#1f1f1f" font-weight="bold">读者契约层</text>
    <text x="198" y="475" font-size="13" fill="#5b6b7a">回报承诺 · 期待管理 · 爽感或挑战</text>
    <line x1="570" y1="457" x2="628" y2="457" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="461" font-size="13" fill="#7a7264">金庸的爽感节奏；乔伊斯的反契约</text>
    <!-- 7 -->
    <rect x="150" y="496" width="420" height="58" rx="8" fill="#f3ede0" stroke="#c9c0ae"/>
    <text x="172" y="521" fill="#b03a2e" font-weight="bold">七</text><text x="198" y="521" fill="#1f1f1f" font-weight="bold">知识与人格底座</text>
    <text x="198" y="543" font-size="13" fill="#5b6b7a">学识结构 · 生平→母题映射 · 时代语境</text>
    <line x1="570" y1="525" x2="628" y2="525" stroke="#c9c0ae" stroke-width="1"/>
    <text x="636" y="529" font-size="13" fill="#7a7264">解释上面六层的「为什么」</text>
  </g>

  <!-- 演化轴 -->
  <line x1="150" y1="628" x2="570" y2="628" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
  </defs>
  <text x="150" y="650" font-size="13" fill="#5b6b7a">演化轴：早期</text>
  <text x="330" y="650" font-size="13" fill="#5b6b7a">巅峰期（默认锁定）</text>
  <text x="516" y="650" font-size="13" fill="#5b6b7a">晚期</text>

  <!-- 右侧说明 -->
  <text x="636" y="580" font-size="13" fill="#7a7264">语言层被语言锁死（翻译不可迁移），</text>
  <text x="636" y="600" font-size="13" fill="#7a7264">二至六层可跨语言复用——外国作家</text>
  <text x="636" y="620" font-size="13" fill="#7a7264">的封装重心天然偏向中高层。</text>
</svg>
